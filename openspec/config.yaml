# openspec/config.yaml
schema: spec-driven

context: |
  Project: invitro-code
  Vision: Interactive learning platform (Duolingo-style) for biotech students to learn AI/ML fundamentals through coding challenges.
  Stack: Undefined — to be decided during explore phase.
  Architecture: Undefined — to be decided during explore phase.
  Testing: No test runner configured yet — to be defined when stack is chosen.
  Strict TDD: false (no test runner available; will be re-evaluated when stack is chosen).
  Style: New project — no conventions established yet.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Document tradeoffs explicitly since this is a new project with no stack
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Keep language accessible for a solo developer learning to program
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Prioritize maintainability and low-cost infrastructure
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    guidelines:
      - Follow existing code patterns (none yet — first code sets the patterns)
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  runner:
    available: false
    framework: null
    command: null
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage:
    available: false
    command: null
  quality:
    linter: { available: false, command: null }
    type_checker: { available: false, command: null }
    formatter: { available: false, command: null }
  note: >
    No test runner, linter, or type checker detected. Project is greenfield.
    Strict TDD is disabled until a stack is chosen and a test runner is configured.
    Recommendation: enable strict_tdd when the first test runner is added.
